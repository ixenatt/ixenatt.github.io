<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Xenatt : Country Code Search</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{

    --bg:#0f1117;
    --card:#171923;

    --text:#f5f7ff;
    --muted:#9aa4bf;

    --border:#2a3042;

    --primary:#6ea8ff;
    --primaryGlow:rgba(110,168,255,.35);

    --shadow:
        0 10px 35px rgba(0,0,0,.45);

}

*{
    box-sizing:border-box;
}

html,
body{

    margin:0;
    padding:0;

    min-height:100%;

    font-family:'Inter',sans-serif;

    background:
        radial-gradient(circle at top left,#1d2436 0%,#0f1117 40%);

    color:var(--text);

}

.container{

    width:100%;
    max-width:1200px;

    margin:auto;

    padding:18px 18px 40px;

    min-height:100vh;

    display:flex;

    flex-direction:column;

    justify-content:center;

    transition:.55s cubic-bezier(.22,.61,.36,1);

}

.container.search-empty{

    justify-content:center;

}

.container.search-active{

    justify-content:flex-start;

    padding-top:40px;

}

.header{

    margin-bottom:24px;

    transition:
        transform .55s cubic-bezier(.22,.61,.36,1),
        text-align .55s ease;

}

.container.search-empty .header{

    text-align:center;

    transform:translateY(40px);

}

.container.search-active .header{

    text-align:left;

    transform:translateY(0);

}

.title{

    margin:0;

    font-size:42px;

    font-weight:700;

    letter-spacing:-1px;

}

.subtitle{

    margin-top:10px;

    color:var(--muted);

    font-size:15px;

}

.search-card{

    position:relative;

    background:rgba(23,25,35,.92);

    border:1px solid var(--border);

    border-radius:999px;

    padding:18px 20px 0px 20px;

    box-shadow:var(--shadow);

    backdrop-filter:blur(16px);

}

.container.search-empty .search-card{

    max-width:820px;

    width:100%;

    margin:0 auto;

}

.search-box{

    position:relative;

}

.search-icon{

    position:absolute;

    left:24px;
    top:50%;

    transform:translateY(-50%);

    color:var(--muted);

    font-size:18px;

    pointer-events:none;

}

#search{

    width:100%;

    height:76px;

    border-radius:999px;

    border:1px solid rgba(255,255,255,.08);

    outline:none;

    background:linear-gradient(
        180deg,
        #141a2b 0%,
        #0f1423 100%
    );

    color:white;

    padding:0 30px 0 64px;

    font-size:18px;

}

#search::placeholder{

    color:#7e879f;

}

#search:focus{

    border-color:var(--primary);

    box-shadow:
        0 0 0 5px var(--primaryGlow);

}

.result-bar{

    margin-top:18px;

    display:flex;

    justify-content:space-between;

    align-items:center;

}

.result-count{

    color:var(--muted);

    font-size:14px;

}

.table-card{

    display:none;

    margin-top:18px;

    overflow:hidden;

    border-radius:28px;

    background:rgba(23,25,35,.92);

    border:1px solid var(--border);

    box-shadow:var(--shadow);

}

.table-wrapper{

    overflow:auto;

}

table{

    width:100%;

    border-collapse:collapse;

}

thead{

    background:#1b2130;

}

th{

    padding:18px 14px;

    text-align:left;

    font-size:13px;

    color:#9fb2e9;

    border-bottom:1px solid var(--border);

}

td{

    padding:16px 14px;

    border-bottom:1px solid rgba(255,255,255,.05);

    color:#edf2ff;

    font-size:14px;

}

tbody tr:hover{

    background:#202638;

}

.highlight{

    background:#ffe066;

    color:#000;

    padding:1px 5px;

    border-radius:6px;

    font-weight:700;

}

@media(max-width:768px){

    .title{

        font-size:28px;

    }

    #search{

        height:60px;

        font-size:16px;

    }

}

</style>

</head>

<body>

<div class="container search-empty">

    <div class="header">

        <h1 class="title">
            Xenatt : Country Code Search
        </h1>

        <div class="subtitle">
            Search by Country Name or 3-Letter Country Code
        </div>

    </div>

    <div class="search-card">

        <div class="search-box">

            <div class="search-icon">
                🔍
            </div>

            <input
                type="search"
                id="search"
                placeholder="Search country name or 3-letter code"
                autocomplete="off"
            >

        </div>

        <div class="result-bar">

            <div
                class="result-count"
                id="resultCount"
            ></div>

        </div>

    </div>

    <div class="table-card">

        <div class="table-wrapper">

            <table>

                <thead>

                    <tr>
                        <th>Country Code</th>
                        <th>Country Name</th>
                    </tr>

                </thead>

                <tbody id="tbody"></tbody>

            </table>

        </div>

    </div>

</div>

<!-- DATABASE -->
<script src="countries.js"></script>

<script>

const searchInput =
    document.getElementById("search");

const tbody =
    document.getElementById("tbody");

const resultCount =
    document.getElementById("resultCount");

let debounceTimer = null;

searchInput.addEventListener("input", function(){

    clearTimeout(debounceTimer);

    debounceTimer = setTimeout(() => {

        doSearch(this.value.trim());

    }, 100);

});

function doSearch(keyword){

    tbody.innerHTML = "";

    const container =
        document.querySelector(".container");

    const tableCard =
        document.querySelector(".table-card");

    if(keyword === ""){

        resultCount.innerHTML = "";

        tableCard.style.display = "none";

        container.classList.remove("search-active");

        container.classList.add("search-empty");

        return;

    }

    container.classList.remove("search-empty");

    container.classList.add("search-active");

    tableCard.style.display = "block";

    keyword = keyword.toLowerCase();

    const results = [];

    const maxResult = 100;

    for(let i=0; i<countries.length; i++){

        const row = countries[i];

        // row[0] = 3-letter code
        // row[1] = 2-letter code
        // row[2] = country name

        const text = (
            row[0] + "|" +
            row[2]
        ).toLowerCase();

        if(text.includes(keyword)){

            results.push(row);

            if(results.length >= maxResult){
                break;
            }

        }

    }

    renderTable(results, keyword);

}

function renderTable(results, keyword){

    tbody.innerHTML = "";

    let html = "";

    for(let i=0; i<results.length; i++){

        const row = results[i];

        html += `
        <tr>
            <td>${highlight(row[1], keyword)}</td>
            <td>${highlight(row[2], keyword)}</td>
        </tr>
        `;

    }

    tbody.innerHTML = html;

    resultCount.innerHTML =
        results.length + " results";

}

function highlight(text, keyword){

    if(keyword === "") return text;

    const regex =
        new RegExp("(" + keyword + ")", "gi");

    return text.replace(
        regex,
        '<span class="highlight">$1</span>'
    );

}

document.addEventListener("keydown", function(e){

    if(e.key === "Escape"){

        searchInput.value = "";

        tbody.innerHTML = "";

        resultCount.innerHTML = "";

        const container =
            document.querySelector(".container");

        const tableCard =
            document.querySelector(".table-card");

        tableCard.style.display = "none";

        container.classList.remove("search-active");

        container.classList.add("search-empty");

        searchInput.focus();

    }

});

</script>

</body>
</html>
