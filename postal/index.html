<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Xenatt : ThaiPost Postal Code Search</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{

    --bg:#0f1117;
    --card:#171923;

    --text:#f5f7ff;
    --muted:#9aa4bf;

    --border:#2a3042;

    --primary:#6ea8ff;
    --primaryGlow:rgba(110,168,255,.35);

    --hover:#252b3d;

    --shadow:
        0 10px 35px rgba(0,0,0,.45);

}

*{
    box-sizing:border-box;
}

html,
body{

    margin:0;
    padding:0;

    min-height:100%;

    font-family:'Inter',sans-serif;

    background:
        radial-gradient(circle at top left,#1d2436 0%,#0f1117 40%);

    color:var(--text);

    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;

}

/* =========================
   CONTAINER
========================= */

.container{

    width:100%;
    max-width:1200px;

    margin:auto;

    padding-left:18px;
    padding-right:18px;
    padding-bottom:40px;

    min-height:100vh;

    display:flex;

    flex-direction:column;

    justify-content:center;

    transition:.55s cubic-bezier(.22,.61,.36,1);

}

/* BEFORE SEARCH */

.container.search-empty{

    justify-content:center;

    padding-top:0;

}

/* AFTER SEARCH */

.container.search-active{

    justify-content:flex-start;

    padding-top:40px;

}

/* =========================
   HEADER
========================= */

.header{

    margin-bottom:24px;

    transition:
        transform .55s cubic-bezier(.22,.61,.36,1),
        text-align .55s ease;

}

/* BEFORE SEARCH */

.container.search-empty .header{

    text-align:center;

    transform:translateY(40px);

}

/* AFTER SEARCH */

.container.search-active .header{

    text-align:left;

    transform:translateY(0);

}

.title{

    margin:0;

    font-size:42px;

    font-weight:700;

    letter-spacing:-1px;

    line-height:1.1;

}

.subtitle{

    margin-top:10px;

    color:var(--muted);

    font-size:15px;

    line-height:1.5;

}

/* =========================
   SEARCH CARD
========================= */

.search-card{

    position:relative;

    background:rgba(23,25,35,.92);

    border:1px solid var(--border);

    border-radius:999px;

    padding:18px 20px 0px 20px;

    box-shadow:var(--shadow);

    backdrop-filter:blur(16px);

    transition:
        all .55s cubic-bezier(.22,.61,.36,1);

}

.container.search-empty .search-card{

    max-width:820px;

    width:100%;

    margin:0 auto;

}

.container.search-active .search-card{

    width:100%;

}

/* =========================
   SEARCH BOX
========================= */

.search-box{

    position:relative;

}

.search-icon{

    position:absolute;

    left:24px;
    top:50%;

    transform:translateY(-50%);

    color:var(--muted);

    font-size:18px;

    pointer-events:none;

    z-index:2;

}

/* CAPSULE SEARCH */

#search{

    width:100%;

    height:76px;

    border-radius:999px;

    border:1px solid rgba(255,255,255,.08);

    outline:none;

    background:linear-gradient(
        180deg,
        #141a2b 0%,
        #0f1423 100%
    );

    color:white;

    padding:
        0
        30px
        0
        64px;

    font-size:18px;

    transition:
        all .35s ease;

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.04),
        0 4px 18px rgba(0,0,0,.25);

    -webkit-appearance:none;

}

#search::placeholder{

    color:#7e879f;

}

#search:focus{

    border-color:var(--primary);

    box-shadow:
        0 0 0 5px var(--primaryGlow),
        0 8px 30px rgba(110,168,255,.18);

    transform:translateY(-1px);

}

/* =========================
   RESULT BAR
========================= */

.result-bar{

    margin-top:18px;

    display:flex;
    justify-content:space-between;
    align-items:center;

}

.result-count{

    color:var(--muted);

    font-size:14px;

    font-weight:500;

}

/* =========================
   TABLE CARD
========================= */

.table-card{

    display:none;

    margin-top:18px;

    overflow:hidden;

    border-radius:28px;

    background:rgba(23,25,35,.92);

    border:1px solid var(--border);

    box-shadow:var(--shadow);

    animation:
        fadeUp .45s cubic-bezier(.22,.61,.36,1);

}

@keyframes fadeUp{

    from{

        opacity:0;

        transform:
            translateY(20px);

    }

    to{

        opacity:1;

        transform:
            translateY(0);

    }

}

/* =========================
   TABLE
========================= */

.table-wrapper{

    overflow:auto;

    -webkit-overflow-scrolling:touch;

}

table{

    width:100%;

    min-width:920px;

    border-collapse:collapse;

}

thead{

    background:#1b2130;

}

th{

    padding:18px 14px;

    text-align:left;

    font-size:13px;

    font-weight:600;

    color:#9fb2e9;

    border-bottom:1px solid var(--border);

    white-space:nowrap;

}

td{

    padding:16px 14px;

    border-bottom:1px solid rgba(255,255,255,.05);

    color:#edf2ff;

    font-size:14px;

    white-space:nowrap;

}

tr{

    transition:.15s;

}

tbody tr:hover{

    background:#202638;

}

/* =========================
   HIGHLIGHT
========================= */

.highlight{

    background:#ffe066;

    color:#000;

    padding:1px 5px;

    border-radius:6px;

    font-weight:700;

}

/* =========================
   TABLET
========================= */

@media(max-width:1024px){

    .container{

        max-width:100%;
        padding-left:16px;
        padding-right:16px;

    }

    .title{

        font-size:36px;

    }

    #search{

        height:70px;

        font-size:17px;

    }

}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

    .container{

        padding-left:12px;
        padding-right:12px;
        padding-bottom:24px;

    }

    .container.search-active{

        padding-top:18px;

    }

    .title{

        font-size:28px;

        line-height:1.2;

    }

    .subtitle{

        font-size:14px;

    }

    .search-card{

        border-radius:28px;

        padding:10px;

    }

    .search-icon{

        left:20px;

        font-size:17px;

    }

    #search{

        height:60px;

        border-radius:18px;

        font-size:16px;

        padding:
            0
            18px
            0
            52px;

    }

    .table-card{

        border-radius:20px;

    }

    td,
    th{

        font-size:13px;

        padding:12px 10px;

    }

}

/* =========================
   SMALL PHONE
========================= */

@media(max-width:480px){

    .title{

        font-size:24px;

    }

    .subtitle{

        font-size:13px;

    }

    #search{

        height:56px;

        font-size:15px;

    }

}

</style>

</head>

<body>

<div class="container search-empty">

    <div class="header">

        <h1 class="title">
            Xenatt : ThaiPost Postal Code Search
        </h1>

        <div class="subtitle">
            Search Postal Code, Tambon, District, Province
        </div>

    </div>

    <div class="search-card">

        <div class="search-box">

            <div class="search-icon">
                🔍
            </div>

            <input
                type="search"
                id="search"
                placeholder="Search Postal Code / Tambon / City / Province"
                autocomplete="off"
                inputmode="search"
                enterkeyhint="search"
            >

        </div>

        <div class="result-bar">

            <div
                class="result-count"
                id="resultCount"
            ></div>

        </div>

    </div>

    <div class="table-card">

        <div class="table-wrapper">

            <table>

                <thead>

                    <tr>
                        <th>Postal Code</th>
                        <th>แขวง / ตำบล</th>
                        <th>Subdistrict</th>
                        <th>เขต / อำเภอ</th>
                        <th>District</th>
                        <th>จังหวัด</th>
                        <th>Province</th>
                    </tr>

                </thead>

                <tbody id="tbody"></tbody>

            </table>

        </div>

    </div>

</div>

<!-- DATABASE -->
<script src="https://ixenatt.github.io/postal/zipcode_database.js"></script>

<script>

const searchInput =
    document.getElementById("search");

const tbody =
    document.getElementById("tbody");

const resultCount =
    document.getElementById("resultCount");

let debounceTimer = null;

/* =========================
   MOBILE DETECT
========================= */

function isMobileDevice(){

    return /Android|iPhone|iPad|iPod|Mobile/i.test(
        navigator.userAgent
    );

}

/* =========================
   AUTO FOCUS MOBILE
========================= */

window.addEventListener("load", () => {

    if(isMobileDevice()){

        setTimeout(() => {

            searchInput.focus();

        }, 300);

    }

});

/* =========================
   SEARCH EVENT
========================= */

searchInput.addEventListener("input", function(){

    clearTimeout(debounceTimer);

    debounceTimer = setTimeout(() => {

        doSearch(this.value.trim());

    }, 100);

});

/* =========================
   SEARCH
========================= */

function doSearch(keyword){

    tbody.innerHTML = "";

    const container =
        document.querySelector(".container");

    const tableCard =
        document.querySelector(".table-card");

    if(keyword === ""){

        resultCount.innerHTML = "";

        tableCard.style.display = "none";

        container.classList.remove("search-active");

        container.classList.add("search-empty");

        return;

    }

    container.classList.remove("search-empty");

    container.classList.add("search-active");

    tableCard.style.display = "block";

    keyword = keyword.toLowerCase();

    const results = [];

    const maxResult = 100;

    for(let i=0; i<zipcodeData.length; i++){

        const row = zipcodeData[i];

        const text = (

            row[0] + "|" +
            row[1] + "|" +
            row[2] + "|" +
            row[3] + "|" +
            row[4] + "|" +
            row[5] + "|" +
            row[6]

        ).toLowerCase();

        if(text.includes(keyword)){

            results.push(row);

            if(results.length >= maxResult){
                break;
            }

        }

    }

    renderTable(results, keyword);

}

/* =========================
   TABLE
========================= */

function renderTable(results, keyword){

    tbody.innerHTML = "";

    let html = "";

    for(let i=0; i<results.length; i++){

        const row = results[i];

        html += `
        <tr>
            <td>${highlight(row[0], keyword)}</td>
            <td>${highlight(row[1], keyword)}</td>
            <td>${highlight(row[2], keyword)}</td>
            <td>${highlight(row[3], keyword)}</td>
            <td>${highlight(row[4], keyword)}</td>
            <td>${highlight(row[5], keyword)}</td>
            <td>${highlight(row[6], keyword)}</td>
        </tr>
        `;

    }

    tbody.innerHTML = html;

    resultCount.innerHTML =
        results.length + " results";

}

/* =========================
   HIGHLIGHT
========================= */

function highlight(text, keyword){

    if(keyword === "") return text;

    const regex =
        new RegExp("(" + keyword + ")", "gi");

    return text.replace(
        regex,
        '<span class="highlight">$1</span>'
    );

}

/* =========================
   ESC CLEAR
========================= */

document.addEventListener("keydown", function(e){

    if(e.key === "Escape"){

        searchInput.value = "";

        tbody.innerHTML = "";

        resultCount.innerHTML = "";

        const container =
            document.querySelector(".container");

        const tableCard =
            document.querySelector(".table-card");

        tableCard.style.display = "none";

        container.classList.remove("search-active");

        container.classList.add("search-empty");

        searchInput.focus();

    }

});

/* =========================
   TYPE TO FOCUS
========================= */

document.addEventListener("keydown", function (e) {

    const active = document.activeElement;

    if (
        active &&
        (
            active.tagName === "INPUT" ||
            active.tagName === "TEXTAREA"
        )
    ) {
        return;
    }

    const isCharacter =
        e.key.length === 1 &&
        !e.ctrlKey &&
        !e.metaKey &&
        !e.altKey;

    const blockedKeys = [
        "Shift",
        "Alt",
        "Control",
        "Meta",
        "Tab",
        "CapsLock",
        "Escape"
    ];

    if (isCharacter && !blockedKeys.includes(e.key)) {

        searchInput.focus();

    }

});

</script>

</body>
</html>
